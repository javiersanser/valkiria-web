services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${COOLIFY_IMAGE:-y1245gqplykoixklexgi0qme}:${COOLIFY_IMAGE_TAG:-latest}
        # container_name MUST be absent for blue-green: Docker creates unique name per deploy
        restart: unless-stopped
        expose:
            - '80'
        networks:
            coolify:
                aliases:
                    - valkiria-web
        labels:
            - traefik.enable=true
            - traefik.http.routers.valkiria-web.rule=Host(`valkirialab.com`)||Host(`www.valkirialab.com`)
            - traefik.http.routers.valkiria-web.entryPoints=http
            - traefik.http.routers.valkiria-web.service=valkiria-web
            - traefik.http.services.valkiria-web.loadbalancer.server.port=80
            - coolify.managed=true
networks:
    coolify:
        external: true
        name: coolify
        attachable: true
